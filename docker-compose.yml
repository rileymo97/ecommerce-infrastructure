version: '3.8'

services:
  database:
    build: ../database
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  product-service:
    build: ../product-service
    environment:
      DB_HOST: database
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: password
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - database
    networks:
      - ecommerce-network

  order-service:
    build: ../order-service
    environment:
      DB_HOST: database
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: password
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      - database
      - product-service
    networks:
      - ecommerce-network

  frontend:
    build: ../ecommerce-frontend
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data: